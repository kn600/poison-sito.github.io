<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALLERIA | POISON</title>
    <!-- Fallback font per lo Swiss Black 721 -->
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Aggiunta di filtri sul box per provare a incattivire visivamente l'iframe di google */
        .gdrive-container {
            position: relative;
            width: 100%;
            height: 600px;
            overflow: hidden;
            border: 4px solid var(--text-color);
            margin-top: 20px;
        }

        .gdrive-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
    <div id="ascii-loader" class="loader-overlay">
        <div class="loader-text" id="loader-eye">[-_-]</div>
    </div>

    <!-- Background Canvas and Overlay -->
    <canvas id="vector-field"></canvas>
    <div class="crt-overlay"></div>

<header class="main-header" style="margin-bottom: 2vh;">
    <h1 class="glitch glitch-small" data-text="ARCHIVIO">ARCHIVIO</h1>
    <br>
    <a href="index.html" class="subtitle" style="text-decoration: none; padding: 10px 20px;">// TORNA ALLA BASE
        //</a>
</header>

<main style="max-width: 1200px; margin: 0 auto;">
    <section class="brutal-box" style="grid-column: 1 / -1; margin-bottom: 50px;">
        <h2 style="color: var(--accent-1); margin-bottom: 10px;">TEST INTEGRAZIONE GDRIVE</h2>
        <div class="gdrive-container">
            <!-- Se l'ID non è esatto, Google risponderà "Errore/Non Trovato". Ma vedrai come viene impaginato. -->
            <iframe class="gdrive-frame"
                src="https://drive.google.com/embeddedfolderview?id=1-xO46DrELSYAwZdjjwjlhwrh18Erqyni#grid"></iframe>
        </div>
    </section>
</main>

<!-- Color Selector UI -->
<div id="color-selector" class="color-selector brutal-box">
    <div class="color-btn" data-color="1" style="--c1:#D85816; --c2:#F3A02C;"></div>
    <div class="color-btn" data-color="2" style="--c1:#B33236; --c2:#E36553;"></div>
    <div class="color-btn" data-color="3" style="--c1:#912476; --c2:#D4649E;"></div>
    <div class="color-btn" data-color="4" style="--c1:#6A009C; --c2:#C72481;"></div>
    <div class="color-btn" data-color="5" style="--c1:#43269A; --c2:#7452A5;"></div>
    <div class="color-btn" data-color="6" style="--c1:#1A3B95; --c2:#3063B2;"></div>
    <div class="color-btn" data-color="7" style="--c1:#225A5C; --c2:#93B2A5;"></div>
    <div class="color-btn" data-color="8" style="--c1:#184F11; --c2:#81B14E;"></div>
</div>

<!-- Script condivisi -->
<script src="script.js"></script>

</body>
</html>
