<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUM MACHINE | POISON</title>
    <!-- Fallback font per lo Swiss Black 721 -->
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Canvas and Overlay shared from main -->
    <canvas id="vector-field"></canvas>
    <div class="crt-overlay"></div>

    <header class="main-header" style="margin-bottom: 4vh;">
        <h1 class="glitch glitch-small" data-text="SEQUENCER">SEQUENCER</h1>
        <br>
        <a href="index.html" class="subtitle" style="text-decoration: none; padding: 10px 20px;">// TORNA ALLA HOME
            //</a>
    </header>

    <main style="width: 100%; max-width: 1800px; margin: 0 auto;">
        <section class="brutal-box" style="grid-column: 1 / -1; text-align: center; padding: 3vw; overflow-x: auto;">
            <div id="transport">
                <button id="play-btn" class="drum-control-btn">[ PLAY ]</button>
                <button id="stop-btn" class="drum-control-btn">[ STOP ]</button>
                <div class="tempo-control">
                    <label for="bpm">BPM: <span id="bpm-val">120</span></label>
                    <input type="range" id="bpm" min="60" max="200" value="120">
                </div>
            </div>

            <div class="sequencer">
                <!-- Generato da drum.js -->
                <div id="seq-grid"></div>
            </div>

            <p style="margin-top: 30px; font-size: 1rem; color: var(--accent-1);">Componi la tua base aggiungendo note
                sulla griglia.</p>
        </section>
    </main>

    <!-- Color Selector UI (permette di cambiare stile anche qui) -->
    <div id="color-selector" class="color-selector brutal-box">
        <div class="color-btn" data-color="1" style="--c1:#D85816; --c2:#F3A02C;"></div>
        <div class="color-btn" data-color="2" style="--c1:#B33236; --c2:#E36553;"></div>
        <div class="color-btn" data-color="3" style="--c1:#912476; --c2:#D4649E;"></div>
        <div class="color-btn" data-color="4" style="--c1:#6A009C; --c2:#C72481;"></div>
        <div class="color-btn" data-color="5" style="--c1:#43269A; --c2:#7452A5;"></div>
        <div class="color-btn" data-color="6" style="--c1:#1A3B95; --c2:#3063B2;"></div>
        <div class="color-btn" data-color="7" style="--c1:#225A5C; --c2:#93B2A5;"></div>
        <div class="color-btn" data-color="8" style="--c1:#184F11; --c2:#81B14E;"></div>
    </div>

    <!-- Script condivisi -->
    <script src="script.js"></script>
    <script src="drum.js"></script>
</body>

</html>
